title: Mesa Docente
description: "IA y educación con mirada crítica, de docente a docente"
lang: es
# Domini propi (apex): baseurl buit perquè el lloc se serveix a l'arrel, no a /blog-docentes/
url: "https://mesadocente.com"
baseurl: ""

author:
  name: "Mesa Docente"   # marca; canvia-ho pel teu nom personal si vols signar els articles amb ell

markdown: kramdown
permalink: /:year/:month/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# jekyll-feed genera /feed.xml automàticament (clau per a l'RSS del blog)
feed:
  posts_limit: 20

exclude:
  - README.md
