title: Mesa Docente
description: "IA y educación con mirada crítica, de docente a docente"
lang: es
# Domini propi (apex): baseurl buit perquè el lloc se serveix a l'arrel, no a /blog-docentes/
url: "https://mesadocente.com"
baseurl: ""

author:
  name: "Mesa Docente"   # marca; canvia-ho pel teu nom personal si vols signar els articles amb ell

markdown: kramdown
permalink: /:year/:month/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap   # genera /sitemap.xml automàticament (suportat de sèrie per GitHub Pages)

# Verificació de propietat de Google Search Console — jekyll-seo-tag ho converteix
# en <meta name="google-site-verification" ...> a l'<head>. No treure-ho mai (mantén la verificació).
google_site_verification: swNyEfqKqPBAqIyHvsdisd8X_7BZ8OlIki04tJaJrO4

# Analítica — descomenta UNA línia quan tinguis el compte creat, i fes push.
# El snippet corresponent (a _layouts/default.html) no es renderitza mentre això estigui comentat.
cf_analytics_token: "916a1eec55f8441c9126e7ffffb494fe"   # Cloudflare Web Analytics: gratis, sense cookies ni banner (ACTIU)
# plausible_domain: mesadocente.com     # Plausible: sense cookies ni banner, de pagament
# ga4_id: G-XXXXXXXXXX                  # Google Analytics 4: gratis, però a la UE demana avís de cookies

# jekyll-feed genera /feed.xml automàticament (clau per a l'RSS del blog)
feed:
  posts_limit: 20

exclude:
  - README.md
